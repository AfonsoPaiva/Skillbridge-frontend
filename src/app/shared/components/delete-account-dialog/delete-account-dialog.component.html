<div mat-dialog-title class="dialog-header">
  <h2>Eliminar Conta</h2>
</div>

<mat-dialog-content>
  <div class="content">
    <p>Esta ação é permanente e vai remover o teu perfil e dados associados.</p>

    <p class="confirmation-instruction">
      Escreve <strong>ELIMINAR</strong> para confirmar.
    </p>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Confirmação</mat-label>
      <input
        matInput
        [(ngModel)]="confirmationText"
        placeholder="ELIMINAR"
        autocomplete="off">
    </mat-form-field>
  </div>
</mat-dialog-content>

<mat-dialog-actions>
  <button mat-stroked-button (click)="cancel()">
    Cancelar
  </button>
  <button 
    mat-raised-button 
    color="warn" 
    (click)="confirm()"
    [disabled]="!canDelete">
    Eliminar Conta
  </button>
</mat-dialog-actions>
