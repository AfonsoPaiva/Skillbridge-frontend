<div mat-dialog-title class="android-install__header">
  <mat-icon>android</mat-icon>
  <h2>Instalar no Android</h2>
</div>

<mat-dialog-content class="android-install__content">
  <p>
    Não foi possível abrir a instalação automática neste momento.
  </p>

  <ol>
    <li>Abra este site no <strong>Chrome</strong> (ou Edge).</li>
    <li>Toque no menu <strong>⋮</strong> do navegador.</li>
    <li>Selecione <strong>Instalar aplicação</strong> ou <strong>Adicionar ao ecrã principal</strong>.</li>
    <li>Confirme em <strong>Instalar</strong>.</li>
  </ol>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="close()">Fechar</button>
</mat-dialog-actions>
