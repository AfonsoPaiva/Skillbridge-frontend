<!-- Content -->
<mat-dialog-content @fadeIn>
  <h2 class="login-title">Bem-vindo de volta</h2>
  <p class="login-sub">Inicia sessão para aceder ao teu perfil e projetos.</p>

  <form [formGroup]="form" (ngSubmit)="submit()" class="login-form">

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Email</mat-label>
      <input matInput type="email" formControlName="email" placeholder="o.teu@email.com" autocomplete="email">
      <mat-icon matSuffix>email</mat-icon>
      <mat-error *ngIf="form.get('email')?.errors?.['required']">O email é obrigatório.</mat-error>
      <mat-error *ngIf="form.get('email')?.errors?.['email']">Insere um email válido.</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Palavra-passe</mat-label>
      <input matInput [type]="showPassword ? 'text' : 'password'"
             formControlName="password" autocomplete="current-password">
      <button mat-icon-button matSuffix type="button" (click)="showPassword = !showPassword">
        <mat-icon>{{ showPassword ? 'visibility_off' : 'visibility' }}</mat-icon>
      </button>
      <mat-error *ngIf="form.get('password')?.errors?.['required']">A palavra-passe é obrigatória.</mat-error>
    </mat-form-field>

    <!-- Forgot password link -->
    <div class="forgot-password-link">
      <button type="button" mat-button color="primary" (click)="forgotPasswordPopover.toggle()">
        Esqueci-me da palavra-passe
      </button>
    </div>

    <div class="error-msg" *ngIf="error">
      <mat-icon>error</mat-icon> {{ error }}
    </div>

    <button type="submit" mat-raised-button color="primary" class="login-btn"
            [disabled]="form.invalid || loading">
      <mat-spinner *ngIf="loading" diameter="18" class="btn-spinner"></mat-spinner>
      <span>{{ loading ? 'A entrar…' : 'Entrar' }}</span>
    </button>
  </form>

  <!-- Divider -->
  <div class="divider"><span>ou continua com</span></div>

  <!-- Social -->
  <div class="social-buttons">
    <button mat-stroked-button class="social-btn social-btn--google" type="button"
            [disabled]="loading" (click)="signInWithProvider('google')">

  <!-- Register link -->
  <div class="register-link">
    Não tens conta?
    <button mat-button color="primary" type="button" (click)="openRegister()">
      Criar conta gratuita
    </button>
  </div>
