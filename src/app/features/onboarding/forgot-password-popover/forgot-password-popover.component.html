<div class="forgot-password-popover">
  <!-- Backdrop -->
  <div class="backdrop" *ngIf="isOpen" (click)="close()"></div>
  
  <!-- Popover content -->
  <div class="popover-content" *ngIf="isOpen">
    <div class="popover-header">
      <h3>Recuperar Palavra-passe</h3>
      <button mat-icon-button (click)="close()" class="close-btn" type="button">
        <mat-icon>close</mat-icon>
      </button>
    </div>
    
    <form [formGroup]="form" (ngSubmit)="submit()">
      <p class="popover-description">
        Insere o teu email e enviaremos um link para redefinires a tua palavra-passe.
      </p>
      
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email</mat-label>
        <input 
          matInput 
          type="email" 
          formControlName="email"
          placeholder="exemplo@email.com"
          autocomplete="email"
        />
        <mat-icon matSuffix>email</mat-icon>
        <mat-error *ngIf="form.get('email')?.hasError('required')">
          Email é obrigatório
        </mat-error>
        <mat-error *ngIf="form.get('email')?.hasError('email')">
          Email inválido
        </mat-error>
      </mat-form-field>
      
      <div class="popover-actions">
        <button 
          mat-button 
          type="button" 
          (click)="close()"
          [disabled]="loading"
        >
          Cancelar
        </button>
        <button 
          mat-raised-button 
          color="primary" 
          type="submit"
          [disabled]="form.invalid || loading"
        >
          <span *ngIf="!loading">Enviar</span>
          <span *ngIf="loading">A enviar...</span>
        </button>
      </div>
    </form>
  </div>
</div>
