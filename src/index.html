<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <title>SkillBridge — Liga Estudantes a Projetos</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, shrink-to-fit=no">
  <meta name="description" content="Plataforma portuguesa que liga estudantes através da partilha de competências (skill barter) para criar projetos reais e enriquecer portfólios.">
  <meta name="theme-color" content="#68007a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <!-- Preconnect to critical external resources -->
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://backendskillbridge-742354947031.europe-west1.run.app">
  <link rel="dns-prefetch" href="https://storage.googleapis.com">
  <link rel="dns-prefetch" href="https://portal.ipl.pt">
  <link rel="dns-prefetch" href="https://maismagazine.pt">
  <link rel="dns-prefetch" href="https://pages.uc.pt">
  
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  
  <!-- Preload critical fonts -->
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap">
  <link rel="preload" as="style" href="https://fonts.googleapis.com/icon?family=Material+Icons&display=block">
  
  <!-- Optimized font loading with font-display -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons&display=block" rel="stylesheet">
  
  <!-- Klaro Cookie Consent (self-hosted via CDN to avoid ad blockers) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/klaro@0.7.22/dist/klaro.min.css">
  <link rel="stylesheet" href="assets/klaro-custom.css">
  <script>
    // Klaro Cookie Consent Configuration for SkillBridge
    window.klaroConfig = {
      lang: 'pt',
      
      translations: {
        pt: {
          consentModal: {
            title: 'Definições de Cookies',
            description: 'Aqui podes ver e personalizar as informações que recolhemos sobre ti.',
          },
          consentNotice: {
            changeDescription: 'Houve alterações desde a tua última visita, por favor atualiza o teu consentimento.',
            description: 'Utilizamos cookies e tecnologias semelhantes para oferecer a melhor experiência no SkillBridge. Clica em "Aceitar todos" para consentir ou "Personalizar" para gerir as tuas preferências.',
            learnMore: 'Personalizar',
            title: 'Cookies & Privacidade',
          },
          ok: 'Aceitar todos',
          acceptAll: 'Aceitar todos',
          acceptSelected: 'Guardar seleção',
          decline: 'Rejeitar todos',
          close: 'Fechar',
          save: 'Guardar',
          service: {
            purpose: 'Finalidade',
            purposes: 'Finalidades',
            required: {
              title: 'Sempre necessário',
              description: 'Este serviço é essencial para o funcionamento do site.'
            },
            disableAll: {
              title: 'Alternar todas as aplicações',
              description: 'Usa este interruptor para ativar/desativar todas as aplicações.'
            },
          },
          poweredBy: 'Criado por estudantes e para estudantes',
        },
      },

      storageMethod: 'localStorage',
      storageName: 'klaro-sb',
      cookieExpiresAfterDays: 365,
      
      htmlTexts: true,
      embedded: false,
      groupByPurpose: true,
      
      mustConsent: false,
      acceptAll: true,
      hideDeclineAll: false,
      hideLearnMore: false,
      noticeAsModal: false,
      
      services: [
        {
          name: 'essencial',
          title: 'Cookies Essenciais',
          description: 'Necessários para autenticação, sessão e preferências.',
          purposes: ['essencial'],
          required: true,
          optOut: false,
          default: true,
          cookies: [
            /^sb_/,
            'klaro-sb'
          ]
        },
        {
          name: 'firebase',
          title: 'Firebase Authentication',
          description: 'Autenticação segura da tua conta.',
          purposes: ['essencial', 'funcional'],
          required: true,
          optOut: false,
          default: true,
          cookies: [
            /^firebase/,
            '__session'
          ]
        },
        {
          name: 'stripe',
          title: 'Stripe (Doações)',
          description: 'Processa pagamentos seguros quando fazes uma doação.',
          purposes: ['pagamentos'],
          required: false,
          optOut: true,
          default: true,
          cookies: [
            /^__stripe/,
            'm'
          ]
        },
        {
          name: 'analytics',
          title: 'Análise e Estatísticas',
          description: 'Ajuda-nos a melhorar a experiência de todos.',
          purposes: ['analytics'],
          required: false,
          optOut: true,
          default: false,
        }
      ],
      
      callback: function(consent, service) {
        console.log('Klaro consent updated:', service ? service.name : 'all services', consent);
      },
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/klaro@0.7.22/dist/klaro-no-css.min.js"></script>
</head>

  <app-root></app-root>
</body>
</html>
